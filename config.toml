[hotkey]
markdown = "alt+q"
plain_text = "alt+w"
exit = ""

[whisper]
model_size = "small"
language = "ja"
device = "cpu" # "cpu" / "cuda"
compute_type = "int8" # "int8" / "float16" for GPU setups
cpu_threads = 4 # Optional: fixes CPU parallelism explicitly
num_workers = 1

[audio]
sample_rate = 16000
channels = 1
dtype = "float32"
min_record_seconds = 0.2

[output]
markdown_newlines = 1

[text_rules]
filler_phrases = [
  "えーっと、",
  "えーっと",
  "えーと、",
  "えーと",
  "えっと、",
  "えっと",
  "あのー",
  "あのー、",
  "あの、",
  "あの",
  "えー、",
  "えー",
]
markdown_title_patterns = [
  "タイトル",
  "title",
]
markdown_heading_patterns = [
  "見出し",
  "heading",
]

[tray]
enabled = true
tooltip = "whisper-tamas-ui"

[llm]
enabled = false
base_url = "http://127.0.0.1:1234/v1"
api_key = ""
model = ""
timeout_seconds = 10.0
prompt = "文字起こし結果の意味を変えず、誤字、固有名詞、表記ゆれのみを修正してください。説明を追加せず、修正後の本文だけを返してください。"
glossary = []