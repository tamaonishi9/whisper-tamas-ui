[hotkey]
markdown = "alt+q"
plain_text = "alt+w"
exit = ""

[whisper]
model_size = "small"
language = "ja"
device = "cuda" # "cpu" / "cuda"
compute_type = "float16" # "int8" / "float16" for GPU setups
cpu_threads = 4 # Optional: fixes CPU parallelism explicitly
num_workers = 1

[audio]
sample_rate = 16000
channels = 1
dtype = "float32"
min_record_seconds = 0.2

[output]
markdown_newlines = 1

[text_rules]
filler_phrases = [
  "えーっと、",
  "えーっと",
  "えーと、",
  "えーと",
  "えっと、",
  "えっと",
  "あのー",
  "あのー、",
  "あの、",
  "あの",
  "えー、",
  "えー",
]
markdown_title_patterns = [
  "タイトル",
  "title",
]
markdown_heading_patterns = [
  "見出し",
  "heading",
]

[tray]
enabled = true
tooltip = "whisper-tamas-ui"

[llm]
enabled = true
base_url = "http://127.0.0.1:1234/v1"
api_key = ""
model = "gemma-4-E4B-it-Q4_K_M"
launch_command = "llama-Gemma.bat"
timeout_seconds = 10.0
prompt = """
You are a proofreading tool for speech-to-text transcription results.

Follow all rules below exactly.

## Allowed Operations

* Correct transcription errors and typos
* Correct proper nouns
* Convert katakana-based technical terms, product names, software names, and AI model names into their commonly used English names
* Insert punctuation
* Adjust line breaks
* Improve readability by adding appropriate paragraph breaks

## Conversion Rules

* When a widely accepted English name exists, convert it to that English name.
* Be proactive when confidence is high.

* Apply the same rule to similar technical terms, product names, and AI model names.
* If the correct English form cannot be determined with reasonable confidence, keep the original text unchanged.

## Forbidden Operations

* Summarization
* Rewriting
* Paraphrasing
* Adding information
* Removing information
* Explanations
* Notes
* Comments
* Headings
* Bullet lists
* Markdown formatting

## Important Requirements

* Do not change the meaning of the original text.
* Do not add information that is not present in the input.
* Preserve all original content.
* Output only the corrected transcription.
* Do not output labels such as:

  * "Corrected Text"
  * "Explanation"
  * "Reason"
  * "Notes"
* Any output other than the corrected transcription is considered a failure.
"""
glossary = [
  # "ExampleTerm",
  # "AnotherTerm",
]
